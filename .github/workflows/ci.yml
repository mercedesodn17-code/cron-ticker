name: CI Pipeline

on:

  push:
    branches: [main]

  pull_request:
    branches: [main]

  workflow_dispatch:

jobs:

  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test